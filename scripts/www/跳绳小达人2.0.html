<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>跳绳小达人 - 计时计数系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== CSS 变量 ========== */
:root {
  --coral: #FF6B6B;
  --coral-light: #FF8E8E;
  --coral-dark: #E85555;
  --mint: #4ECDC4;
  --mint-light: #7EDDD6;
  --mint-dark: #3AB5AD;
  --cream: #FFF8E7;
  --yellow: #FFE66D;
  --yellow-dark: #F5D442;
  --purple: #A78BFA;
  --purple-light: #C4B5FD;
  --sky: #87CEEB;
  --dark: #2D3436;
  --dark-soft: #636E72;
  --white: #FFFFFF;
  --shadow-soft: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-medium: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-heavy: 0 12px 48px rgba(0,0,0,0.16);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-lg: 28px;
}

/* ========== 基础重置 ========== */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'Quicksand', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ========== 背景装饰 ========== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(78,205,196,0.12) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(255,107,107,0.10) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,230,109,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* 浮动装饰圆点 */
.deco-dots {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.deco-dot {
  position: absolute;
  border-radius: 50%;
  opacity: 0.15;
  animation: floatDot 8s ease-in-out infinite;
}
.deco-dot:nth-child(1) { width: 80px; height: 80px; background: var(--coral); top: 10%; left: 5%; animation-delay: 0s; }
.deco-dot:nth-child(2) { width: 60px; height: 60px; background: var(--mint); top: 30%; right: 8%; animation-delay: 2s; }
.deco-dot:nth-child(3) { width: 100px; height: 100px; background: var(--yellow); bottom: 20%; left: 10%; animation-delay: 4s; }
.deco-dot:nth-child(4) { width: 50px; height: 50px; background: var(--purple); top: 60%; right: 15%; animation-delay: 1s; }
.deco-dot:nth-child(5) { width: 70px; height: 70px; background: var(--sky); bottom: 10%; right: 5%; animation-delay: 3s; }

@keyframes floatDot {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}

/* ========== 主容器 ========== */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 40px;
  min-height: 100vh;
}

/* ========== 头部 ========== */
.header {
  text-align: center;
  padding: 24px 0 16px;
  animation: slideDown 0.6s ease-out;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}
.header-icon {
  font-size: 48px;
  display: inline-block;
  animation: bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-16px); }
  50% { transform: translateY(0); }
  70% { transform: translateY(-8px); }
}
.header h1 {
  font-family: 'Baloo 2', cursive;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--coral), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-top: 4px;
  letter-spacing: 2px;
}
.header p {
  font-size: 0.85rem;
  color: var(--dark-soft);
  font-weight: 500;
  margin-top: 2px;
}

/* ========== 卡片通用 ========== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);
  border: 2px solid transparent;
  transition: all 0.3s ease;
  animation: fadeUp 0.6s ease-out both;
}
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.2s; }
.card:nth-child(4) { animation-delay: 0.3s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.card-title .icon { font-size: 1.3rem; }

/* ========== 儿童信息区 ========== */
.child-profile {
  display: flex;
  align-items: center;
  gap: 16px;
}
.avatar-wrap {
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
}
.avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--mint-light), var(--mint));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  border: 3px solid var(--white);
  box-shadow: 0 4px 16px rgba(78,205,196,0.3);
  overflow: hidden;
  transition: transform 0.3s ease;
}
.avatar:hover { transform: scale(1.08); }
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.avatar-edit {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 26px;
  height: 26px;
  background: var(--yellow);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border: 2px solid var(--white);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.2s;
}
.avatar-edit:hover { transform: scale(1.15); }

.child-info { flex: 1; }
.child-name {
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--dark);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.child-name:hover { color: var(--coral); }
.child-name .edit-hint {
  font-size: 0.7rem;
  color: var(--dark-soft);
  opacity: 0;
  transition: opacity 0.2s;
}
.child-name:hover .edit-hint { opacity: 1; }
.child-tag {
  display: inline-block;
  margin-top: 4px;
  padding: 3px 12px;
  background: linear-gradient(135deg, var(--yellow), #FFD93D);
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  color: #8B6914;
}

/* ========== 计时器选择 ========== */
.timer-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.timer-opt {
  padding: 10px 4px;
  border: 2px solid #EEE;
  border-radius: var(--radius-sm);
  background: var(--white);
  font-family: 'Baloo 2', cursive;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--dark-soft);
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: center;
  user-select: none;
}
.timer-opt:hover {
  border-color: var(--coral-light);
  color: var(--coral);
  transform: translateY(-2px);
}
.timer-opt.active {
  background: linear-gradient(135deg, var(--coral), var(--coral-dark));
  color: var(--white);
  border-color: transparent;
  box-shadow: 0 4px 16px rgba(255,107,107,0.35);
  transform: translateY(-2px);
}

/* 自定义时间输入 */
.custom-time-row {
  display: none;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease;
}
.custom-time-row.show { display: flex; }
.custom-input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid #EEE;
  border-radius: var(--radius-sm);
  font-family: 'Quicksand', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--dark);
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
}
.custom-input:focus { border-color: var(--coral); }
.custom-unit {
  font-weight: 600;
  color: var(--dark-soft);
  font-size: 0.9rem;
}

/* ========== 计时器显示 ========== */
.timer-display {
  text-align: center;
  padding: 28px 0 20px;
  position: relative;
}
.timer-ring {
  position: relative;
  width: 220px;
  height: 220px;
  margin: 0 auto;
}
.timer-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.timer-ring .ring-bg {
  fill: none;
  stroke: #F0F0F0;
  stroke-width: 8;
}
.timer-ring .ring-progress {
  fill: none;
  stroke: url(#timerGradient);
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 628;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.5s linear;
}
.timer-time {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.timer-time .time-digits {
  font-family: 'Baloo 2', cursive;
  font-size: 3.2rem;
  font-weight: 800;
  color: var(--dark);
  line-height: 1;
  letter-spacing: 2px;
}
.timer-time .time-label {
  font-size: 0.75rem;
  color: var(--dark-soft);
  font-weight: 600;
  margin-top: 2px;
}

/* 计时器状态动画 */
.timer-display.running .timer-ring {
  animation: pulse-ring 2s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%, 100% { filter: drop-shadow(0 0 0 transparent); }
  50% { filter: drop-shadow(0 0 20px rgba(255,107,107,0.2)); }
}

/* ========== 中断计数 ========== */
.interrupt-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin: 16px 0;
  padding: 16px;
  background: linear-gradient(135deg, #FFF5F5, #FFF0F0);
  border-radius: var(--radius);
}
.interrupt-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-weight: 700;
}
.interrupt-btn:active { transform: scale(0.92); }
.interrupt-minus {
  background: #FFE0E0;
  color: var(--coral);
}
.interrupt-minus:hover { background: #FFD0D0; }
.interrupt-plus {
  background: var(--coral);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(255,107,107,0.35);
}
.interrupt-plus:hover { background: var(--coral-dark); }
.interrupt-count {
  text-align: center;
}
.interrupt-count .count-num {
  font-family: 'Baloo 2', cursive;
  font-size: 2.4rem;
  font-weight: 800;
  color: var(--coral);
  line-height: 1;
}
.interrupt-count .count-label {
  font-size: 0.72rem;
  color: var(--dark-soft);
  font-weight: 600;
}

/* ========== 控制按钮 ========== */
.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}
.btn {
  padding: 14px 32px;
  border: none;
  border-radius: 50px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.btn:active { transform: scale(0.95); }
.btn-start {
  background: linear-gradient(135deg, var(--mint), var(--mint-dark));
  color: var(--white);
  box-shadow: 0 6px 24px rgba(78,205,196,0.4);
}
.btn-start:hover { box-shadow: 0 8px 32px rgba(78,205,196,0.5); transform: translateY(-2px); }
.btn-pause {
  background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
  color: #8B6914;
  box-shadow: 0 6px 24px rgba(255,230,109,0.4);
}
.btn-pause:hover { box-shadow: 0 8px 32px rgba(255,230,109,0.5); transform: translateY(-2px); }
.btn-reset {
  background: #F0F0F0;
  color: var(--dark-soft);
}
.btn-reset:hover { background: #E5E5E5; transform: translateY(-2px); }
.btn-card {
  background: linear-gradient(135deg, var(--purple), #8B5CF6);
  color: var(--white);
  box-shadow: 0 6px 24px rgba(167,139,250,0.4);
  width: 100%;
  justify-content: center;
  padding: 16px;
  font-size: 1.1rem;
}
.btn-card:hover { box-shadow: 0 8px 32px rgba(167,139,250,0.5); transform: translateY(-2px); }

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

/* ========== 签名卡弹窗 ========== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}
.modal-overlay.show { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 400px;
  overflow: hidden;
  box-shadow: var(--shadow-heavy);
  animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalPop {
  from { opacity: 0; transform: scale(0.85) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--white); transform: scale(1.1); }

/* ========== 签名卡样式 ========== */
.sign-card {
  position: relative;
  overflow: hidden;
}
.sign-card-header {
  background: linear-gradient(135deg, var(--coral), #FF8A65, var(--yellow));
  padding: 28px 24px 36px;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sign-card-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 20px;
  background: var(--white);
  border-radius: 20px 20px 0 0;
  z-index: 2;
}
.sign-card-header .trophy { font-size: 48px; display: block; margin-bottom: 4px; }
.sign-card-header h2 {
  font-family: 'Baloo 2', cursive;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--white);
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.sign-card-body {
  padding: 20px 24px 24px;
  position: relative;
  z-index: 3;
}
.sign-card-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px dashed #F0F0F0;
}
.sign-card-row:last-child { border-bottom: none; }
.sign-card-row .row-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  margin-right: 12px;
  flex-shrink: 0;
}
.sign-card-row .row-label {
  font-size: 0.78rem;
  color: var(--dark-soft);
  font-weight: 500;
}
.sign-card-row .row-value {
  font-family: 'Baloo 2', cursive;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--dark);
}
.row-icon.icon-child { background: #E8F5E9; overflow: hidden; }
.row-icon.icon-child img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.row-icon.icon-time { background: #E3F2FD; }
.row-icon.icon-duration { background: #FFF3E0; }
.row-icon.icon-interrupt { background: #FCE4EC; }

.sign-card-stamp {
  position: absolute;
  top: 50%;
  right: 20px;
  transform: translateY(-50%);
  z-index: 10;
  pointer-events: none;
}
.stamp {
  display: inline-block;
  padding: 6px 18px;
  border: 3px solid var(--mint);
  border-radius: 12px;
  font-family: 'Baloo 2', cursive;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--mint-dark);
  transform: rotate(12deg);
  background: rgba(255,255,255,0.85);
  box-shadow: 0 2px 8px rgba(78,205,196,0.2);
}
.stamp::before {
  content: '✓';
  margin-right: 6px;
}

.sign-card-actions {
  padding: 0 24px 24px;
  display: flex;
  gap: 10px;
  position: relative;
  z-index: 3;
}
.btn-save {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 50px;
  font-family: 'Baloo 2', cursive;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: linear-gradient(135deg, var(--mint), var(--mint-dark));
  color: var(--white);
  box-shadow: 0 4px 16px rgba(78,205,196,0.3);
}
.btn-save:hover { transform: translateY(-2px); }
.btn-close-modal {
  padding: 12px 20px;
  border: 2px solid #EEE;
  border-radius: 50px;
  background: var(--white);
  font-family: 'Baloo 2', cursive;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--dark-soft);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-close-modal:hover { border-color: #DDD; transform: translateY(-2px); }

/* ========== 编辑弹窗 ========== */
.edit-modal .modal-content {
  padding: 28px 24px;
  text-align: center;
}
.edit-modal .modal-content h3 {
  font-family: 'Baloo 2', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 20px;
}
.edit-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #EEE;
  border-radius: var(--radius-sm);
  font-family: 'Quicksand', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--dark);
  outline: none;
  text-align: center;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}
.edit-input:focus { border-color: var(--coral); }
.edit-actions {
  display: flex;
  gap: 10px;
}
.edit-actions .btn { flex: 1; justify-content: center; }

/* ========== 完成动画 ========== */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 200;
}
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ========== 响应式 ========== */
@media (max-width: 360px) {
  .timer-options { grid-template-columns: repeat(3, 1fr); }
  .timer-ring { width: 180px; height: 180px; }
  .timer-time .time-digits { font-size: 2.6rem; }
}

/* ========== 隐藏文件输入 ========== */
#avatarInput { display: none; }

/* ========== 累计倒计时区域 ========== */
.accumulate-section {
  padding: 16px;
  background: linear-gradient(135deg, #F0FFF4, #E8F5E9);
  border-radius: var(--radius);
  margin-bottom: 16px;
  text-align: center;
}
.acc-header {
  margin-bottom: 12px;
}
.acc-title {
  font-family: 'Baloo 2', cursive;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--dark);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.acc-hint {
  font-size: 0.7rem;
  color: var(--dark-soft);
  font-weight: 500;
  margin-top: 2px;
}
.acc-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin: 8px 0;
}
.acc-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-weight: 700;
}
.acc-btn:active { transform: scale(0.92); }
.acc-minus {

/* 休息状态下的环形颜色变化 */

@keyframes pulse-rest {

/* 开关样式 */

  position: relative;
  width: 50px;
  height: 28px;
}

  opacity: 0;
  width: 0;
  height: 0;

  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #DDD;
  border-radius: 28px;
  transition: all 0.3s ease;

<script>
// ========== 状态管理 ==========
const state = {
  childName: localStorage.getItem('jump_childName') || '小明',
  avatarSrc: localStorage.getItem('jump_avatarSrc') || null,
  selectedMinutes: 1,
  totalSeconds: 60,
  remainingSeconds: 60,
  interrupts: 0,
  interruptsPerRound: [],  // 每轮中断次数记录，下标0=第1轮
  isRunning: false,
  isPaused: false,
  isFinished: false,
  timerId: null,
  startTimestamp: null,
  broadcastEnabled: true,
  // 累计倒计时
  accTotalRounds: 1,   // 总轮数
  accCurrentRound: 1,  // 当前第几轮
  // 轮间休息
  restEnabled: false,       // 是否开启轮间休息
  isResting: false,         // 当前是否在休息中
  restSeconds: 60,          // 休息时长（秒）
  restRemaining: 60,        // 休息剩余秒数
  waitingNextRound: false,  // 休息结束，等待手动开始下一轮
};

// ========== 语音播报模块（多引擎兼容方案） ==========
const broadcast = {
  // AudioContext 实例，用于蜂鸣音兜底
  _audioCtx: null,
  // 当前正在播放的 Audio 元素
  _currentAudio: null,
  // 标记 AudioContext 是否已解锁
  _audioUnlocked: false,
  // Web Speech API 是否可用（运行时检测）
  _speechAvailable: false,
  // 缓存中文语音
  _zhVoice: null,

  /** 初始化 */
  init() {
    // 检测 Web Speech API
    if ('speechSynthesis' in window) {
      const loadVoices = () => {
        const voices = window.speechSynthesis.getVoices();
        this._zhVoice = voices.find(v => v.lang === 'zh-CN')
          || voices.find(v => v.lang.startsWith('zh'))
          || null;
        if (voices.length > 0) this._speechAvailable = true;
      };
      loadVoices();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
      }
    }
  },

  /**
   * 在用户手势（点击）中调用，解锁移动端音频播放限制。
   * 同时解锁 AudioContext 和 speechSynthesis。
   */
  unlock() {
    if (this._audioUnlocked) return;
    // 解锁 AudioContext（用于蜂鸣音兜底）
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) {
        this._audioCtx = new AudioCtx();
        // 播放一段极短的静音来解锁
        const buf = this._audioCtx.createBuffer(1, 1, 22050);
        const src = this._audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(this._audioCtx.destination);
        src.start(0);
      }
    } catch(e) { /* 忽略 */ }
    // 解锁 speechSynthesis
    if ('speechSynthesis' in window) {
      try {
        const u = new SpeechSynthesisUtterance('');
        u.volume = 0;
        u.lang = 'zh-CN';
        window.speechSynthesis.speak(u);
      } catch(e) { /* 忽略 */ }
    }
    // 解锁 Audio 元素播放
    try {
      const silentAudio = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
      silentAudio.volume = 0;
      silentAudio.play().catch(() => {});
    } catch(e) { /* 忽略 */ }
    this._audioUnlocked = true;
  },

  /**
   * 核心播报方法 - 多引擎降级策略：
   * 1. 优先尝试 Web Speech API
   * 2. 失败则用蜂鸣音提示
   */
  speak(text) {
    if (!state.broadcastEnabled) return;
    // 方案1：Web Speech API
    if (this._trySpeechSynthesis(text)) return;
    // 方案2：蜂鸣音兜底（至少有声音提醒）
    this._playBeep();
  },

  /** 尝试使用 Web Speech API */
  _trySpeechSynthesis(text) {
    if (!('speechSynthesis' in window)) return false;
    try {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 1.05;
      utterance.pitch = 1.1;
      utterance.volume = 1;
      if (this._zhVoice) utterance.voice = this._zhVoice;
      // 监听是否真的能播放
      let spoke = false;
      utterance.onstart = () => { spoke = true; };
      utterance.onerror = () => {
        if (!spoke) this._playBeep();
      };
      window.speechSynthesis.speak(utterance);
      return true;
    } catch(e) {
      return false;
    }
  },

  /** 使用 AudioContext 播放蜂鸣提示音 */
  _playBeep(freq = 880, duration = 0.15) {
    try {
      const ctx = this._audioCtx;
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) { /* 忽略 */ }
  },

  /** 播放双音提示（用于重要节点，如开始/结束） */
  _playDoubleBeep() {
    this._playBeep(880, 0.15);
    setTimeout(() => this._playBeep(1100, 0.2), 200);
  },

  /** 播放完成音效（三连音） */
  _playFinishSound() {
    this._playBeep(880, 0.12);
    setTimeout(() => this._playBeep(1100, 0.12), 150);
    setTimeout(() => this._playBeep(1320, 0.25), 300);
  },

  /** 开始计时播报 */
  onStart(minutes) {
    this.speak(`计时开始，${minutes}分钟跳绳，加油！`);
  },

  /** 暂停播报 */
  onPause() {
    this.speak('已暂停');
  },

  /** 继续播报 */
  onResume() {
    this.speak('继续，加油！');
  },

  /** 每分钟播报 */
  onMinuteMark(remainingMins) {
    if (remainingMins > 0) {
      this.speak(`还剩${remainingMins}分钟`);
    }
  },

  /** 最后10秒倒数播报 */
  onCountdown(seconds) {
    // 倒计时用语音说数字，如果语音不可用则用蜂鸣
    if (!state.broadcastEnabled) return;
    if (!this._trySpeechSynthesis(`${seconds}`)) {
      // 蜂鸣音频率随倒计时升高，营造紧迫感
      const freq = 600 + (10 - seconds) * 60;
      this._playBeep(freq, 0.1);
    }
  },

  /** 完成播报 */
  onFinish(name) {
    if (!state.broadcastEnabled) return;
    if (!this._trySpeechSynthesis(`时间到！${name}太棒了，跳绳完成！`)) {
      this._playFinishSound();
    }
  },

  /** 根据剩余秒数判断是否需要播报 */
  checkAndSpeak(remaining, total) {
    if (!state.broadcastEnabled) return;
    // 最后10秒逐秒倒数
    if (remaining <= 10 && remaining > 0) {
      this.onCountdown(remaining);
      return;
    }
    // 最后30秒提醒（仅一次）
    if (remaining === 30 && total > 30) {
      this.speak('还剩30秒，冲刺！');
      return;
    }
    // 每分钟整点播报
    if (remaining > 0 && remaining % 60 === 0) {
      this.onMinuteMark(remaining / 60);
    }
  }
};

// 播报开关事件
const bcToggle = document.getElementById('broadcastToggle');
const bcStatusDot = document.getElementById('bcStatus');
bcToggle.addEventListener('change', function() {
  state.broadcastEnabled = this.checked;
  if (!this.checked) {
    // 停止所有音频
    window.speechSynthesis && window.speechSynthesis.cancel();
    if (broadcast._currentAudio) {
      broadcast._currentAudio.pause();
      broadcast._currentAudio = null;
    }
    bcStatusDot.classList.remove('active');
  }
});

// 初始化语音模块
broadcast.init();

// 休息开关事件
const restToggle = document.getElementById('restToggle');
restToggle.addEventListener('change', function() {
  state.restEnabled = this.checked;
});

// ========== DOM 引用 ==========
const $ = (id) => document.getElementById(id);
const ringProgress = $('ringProgress');
const timeDigits = $('timeDigits');
const timeLabel = $('timeLabel');
const timerDisplay = $('timerDisplay');
const interruptCountEl = $('interruptCount');
const btnStart = $('btnStart');
const btnReset = $('btnReset');
const circumference = 2 * Math.PI * 100; // 圆环周长

// 初始化圆环
ringProgress.style.strokeDasharray = circumference;
ringProgress.style.strokeDashoffset = '0';

// ========== 时长选择 ==========
document.querySelectorAll('.timer-opt').forEach(opt => {
  opt.addEventListener('click', function() {
    if (state.isRunning) return; // 运行中不允许切换

    // 移除所有 active
    document.querySelectorAll('.timer-opt').forEach(o => o.classList.remove('active'));
    this.classList.add('active');

    const minutes = this.dataset.minutes;
    const customRow = $('customTimeRow');

    if (minutes === 'custom') {
      customRow.classList.add('show');
      const customVal = parseInt($('customMinutes').value);
      if (customVal > 0) {
        setDuration(customVal);
      }
    } else {
      customRow.classList.remove('show');
      setDuration(parseInt(minutes));
    }
  });
});

// 自定义分钟数输入
$('customMinutes').addEventListener('input', function() {
  let val = parseInt(this.value);
  if (val > 120) { this.value = 120; val = 120; }
  if (val > 0 && !state.isRunning) {
    setDuration(val);
  }
});

// 设置时长
function setDuration(minutes) {
  state.selectedMinutes = minutes;
  state.totalSeconds = minutes * 60;
  state.remainingSeconds = minutes * 60;
  state.isFinished = false;
  updateTimerDisplay();
  updateRing();
  updateAccDisplay();
  timeLabel.textContent = '准备开始';
}

// ========== 计时器显示更新 ==========
function updateTimerDisplay() {
  const mins = Math.floor(state.remainingSeconds / 60);
  const secs = state.remainingSeconds % 60;
  timeDigits.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function updateRing() {
  const progress = state.remainingSeconds / state.totalSeconds;
  const offset = circumference * (1 - progress);
  ringProgress.style.strokeDashoffset = offset;
}

// ========== 计时器控制 ==========
function startTimer() {
  if (state.isFinished) return;

  // 移动端浏览器要求首次语音播报必须在用户手势中触发，这里解锁
  broadcast.unlock();

  // 休息结束后手动开始下一轮
  if (state.waitingNextRound) {
    state.waitingNextRound = false;
    state.accCurrentRound++;
    state.interrupts = 0;
    interruptCountEl.textContent = '0';
    state.remainingSeconds = state.totalSeconds;
    state.isRunning = true;
    state.isPaused = false;
    updateTimerDisplay();
    updateRing();
    updateAccDisplay();
    btnStart.innerHTML = '⏸ 暂停';
    btnStart.className = 'btn btn-pause';
    timeLabel.textContent = `跳绳中... 第${state.accCurrentRound}/${state.accTotalRounds}轮`;
    timerDisplay.classList.remove('resting');
    timerDisplay.classList.add('running');
    if (state.broadcastEnabled) bcStatusDot.classList.add('active');
    broadcast.speak(`第${state.accCurrentRound}轮开始，加油！`);
    state.timerId = setInterval(timerTick, 1000);
    return;
  }

  if (state.isRunning && !state.isPaused) {
    // 暂停 - 自动加一次中断次数
    state.isPaused = true;
    clearInterval(state.timerId);
    state.timerId = null;
    state.interrupts++;
    interruptCountEl.textContent = state.interrupts;
    // 中断数弹跳动画
    interruptCountEl.style.transform = 'scale(1.3)';
    setTimeout(() => { interruptCountEl.style.transform = 'scale(1)'; }, 200);
    btnStart.innerHTML = '▶ 继续';
    btnStart.className = 'btn btn-start';
    timeLabel.textContent = '已暂停';
    timerDisplay.classList.remove('running');
    bcStatusDot.classList.remove('active');
    broadcast.onPause();
    return;
  }

  if (state.isPaused) {
    // 从暂停恢复
    state.isPaused = false;
    broadcast.onResume();
  } else {
    // 全新开始
    state.startTimestamp = new Date();
    // 确保自定义时间已设置
    const activeOpt = document.querySelector('.timer-opt.active');
    if (activeOpt && activeOpt.dataset.minutes === 'custom') {
      const customVal = parseInt($('customMinutes').value);
      if (!customVal || customVal <= 0) {
        shakeElement($('customMinutes'));
        return;
      }
      setDuration(customVal);
    }
    broadcast.onStart(state.selectedMinutes);
  }

  state.isRunning = true;
  state.isPaused = false;
  btnStart.innerHTML = '⏸ 暂停';
  btnStart.className = 'btn btn-pause';
  timeLabel.textContent = state.accTotalRounds > 1 ? `跳绳中... 第${state.accCurrentRound}/${state.accTotalRounds}轮` : '跳绳中...';
  timerDisplay.classList.add('running');
  if (state.broadcastEnabled) bcStatusDot.classList.add('active');

  state.timerId = setInterval(timerTick, 1000);
}

function timerTick() {
    // 休息倒计时模式
    if (state.isResting) {
      state.restRemaining--;
      // 更新显示为休息倒计时
      const mins = Math.floor(state.restRemaining / 60);
      const secs = state.restRemaining % 60;
      timeDigits.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      // 更新环形进度（基于休息时长）
      const progress = state.restRemaining / state.restSeconds;
      const offset = circumference * (1 - progress);
      ringProgress.style.strokeDashoffset = offset;

      // 休息最后5秒播报
      if (state.restRemaining <= 5 && state.restRemaining > 0) {
        broadcast.onCountdown(state.restRemaining);
      }

      if (state.restRemaining <= 0) {
        // 休息结束，等待手动开始下一轮
        clearInterval(state.timerId);
        state.timerId = null;
        state.isResting = false;
        state.waitingNextRound = true;
        state.isRunning = false;
        timerDisplay.classList.remove('resting');
        $('restBadge').classList.remove('show');
        timeLabel.textContent = `☕ 休息结束，准备第${state.accCurrentRound + 1}轮`;
        btnStart.innerHTML = `▶ 开始第${state.accCurrentRound + 1}轮`;
        btnStart.className = 'btn btn-next-round';
        btnStart.disabled = false;
        broadcast.speak(`休息结束，准备开始第${state.accCurrentRound + 1}轮`);
      }
      return;
    }

    // 正常跳绳倒计时
    state.remainingSeconds--;
    updateTimerDisplay();
    updateRing();

    // iOS Safari 会在后台挂起 speechSynthesis，定期 resume 保持活跃
    if (window.speechSynthesis && window.speechSynthesis.speaking) {
      window.speechSynthesis.resume();
    }

    // 语音播报检查
    broadcast.checkAndSpeak(state.remainingSeconds, state.totalSeconds);

    if (state.remainingSeconds <= 0) {
      // 当前轮结束
      clearInterval(state.timerId);
      state.timerId = null;

      if (state.accCurrentRound < state.accTotalRounds) {
        // 还有下一轮
        if (state.restEnabled) {
          // 开启了轮间休息，进入休息倒计时
          // 保存当前轮中断次数
          state.interruptsPerRound[state.accCurrentRound - 1] = state.interrupts;
          state.isResting = true;
          state.restRemaining = state.restSeconds;
          timerDisplay.classList.remove('running');
          timerDisplay.classList.add('resting');
          $('restBadge').classList.add('show');
          timeLabel.textContent = `☕ 休息中... 下一轮：第${state.accCurrentRound + 1}轮`;
          btnStart.innerHTML = '☕ 休息中';
          btnStart.className = 'btn btn-pause';
          btnStart.disabled = true;
          broadcast.speak(`本轮结束，休息1分钟`);
          // 更新显示为休息时间
          const mins = Math.floor(state.restRemaining / 60);
          const secs = state.restRemaining % 60;
          timeDigits.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
          // 重置环形为休息进度
          ringProgress.style.strokeDashoffset = '0';
          // 启动休息倒计时
          state.timerId = setInterval(timerTick, 1000);
        } else {
          // 没有休息，直接自动开始下一轮
          // 保存当前轮中断次数，新轮归零
          state.interruptsPerRound[state.accCurrentRound - 1] = state.interrupts;
          state.accCurrentRound++;
          state.interrupts = 0;
          interruptCountEl.textContent = '0';
          state.remainingSeconds = state.totalSeconds;
          updateTimerDisplay();
          updateRing();
          updateAccDisplay();
          broadcast.speak(`第${state.accCurrentRound}轮开始，加油！`);
          timeLabel.textContent = `跳绳中... 第${state.accCurrentRound}/${state.accTotalRounds}轮`;
          // 重新启动定时器
          state.timerId = setInterval(timerTick, 1000);
        }
      } else {
        // 全部轮次完成
        state.interruptsPerRound[state.accCurrentRound - 1] = state.interrupts;
        state.isRunning = false;
        state.isFinished = true;
        timeLabel.textContent = '🎉 完成！';
        timerDisplay.classList.remove('running');
        bcStatusDot.classList.remove('active');
        btnStart.innerHTML = '✅ 已完成';
        btnStart.className = 'btn btn-start';
        btnStart.disabled = true;
        broadcast.onFinish(state.childName);
        launchConfetti();
      }
    }
}

function resetTimer() {
  // 记录当前是否在休息中
  const wasResting = state.isResting;

  clearInterval(state.timerId);
  state.timerId = null;

  // 停止所有音频播报
  window.speechSynthesis && window.speechSynthesis.cancel();
  if (broadcast._currentAudio) {
    broadcast._currentAudio.pause();
    broadcast._currentAudio = null;
  }
  bcStatusDot.classList.remove('active');
  timerDisplay.classList.remove('running');
  timerDisplay.classList.remove('resting');
  $('restBadge').classList.remove('show');

  // 公共状态重置
  state.isRunning = false;
  state.isPaused = false;
  state.isFinished = false;
  state.isResting = false;
  state.restRemaining = state.restSeconds;
  state.waitingNextRound = false;

  if (wasResting && state.accCurrentRound < state.accTotalRounds) {
    // 休息倒计时中重置 → 进入下一轮的准备状态
    // 当前轮中断已在进入休息时保存，新轮中断归零
    state.interrupts = 0;
    interruptCountEl.textContent = '0';
    state.accCurrentRound++;
    state.remainingSeconds = state.totalSeconds;
    updateTimerDisplay();
    updateRing();
    updateAccDisplay();
    timeLabel.textContent = `准备开始第${state.accCurrentRound}轮`;
    btnStart.innerHTML = `▶ 开始第${state.accCurrentRound}轮`;
    btnStart.className = 'btn btn-next-round';
    btnStart.disabled = false;
  } else {
    // 跳绳倒计时中重置（或其他状态） → 重置为当前轮的初始状态
    state.interrupts = 0;
    interruptCountEl.textContent = '0';
    state.remainingSeconds = state.totalSeconds;
    state.startTimestamp = null;
    updateTimerDisplay();
    updateRing();
    updateAccDisplay();
    if (state.accTotalRounds > 1) {
      timeLabel.textContent = `准备开始第${state.accCurrentRound}轮`;
      btnStart.innerHTML = `▶ 开始第${state.accCurrentRound}轮`;
    } else {
      timeLabel.textContent = '准备开始';
      btnStart.innerHTML = '▶ 开始';
    }
    btnStart.className = 'btn btn-start';
    btnStart.disabled = false;
  }
}

function generateCard() {
  const now = new Date();
  const timeStr = formatDateTime(now);

  // 同步头像到签名卡
  const cardAvatarEl = $('cardAvatar');
  if (state.avatarSrc) {
    cardAvatarEl.innerHTML = `<img src="${state.avatarSrc}" alt="头像">`;

  }

  $('cardChildName').textContent = state.childName;
  $('cardTime').textContent = timeStr;
  $('cardDuration').textContent = `${state.accTotalRounds * state.selectedMinutes} 分钟（${state.accTotalRounds}轮 × ${state.selectedMinutes}分钟）`;
  // 生成中断次数文本（每轮详情）
  const totalInterrupts = state.interruptsPerRound.reduce((sum, n) => sum + n, 0);
  let interruptText = `${totalInterrupts} 次`;
  if (state.accTotalRounds > 1 && state.interruptsPerRound.length > 0) {
    const details = state.interruptsPerRound.map((n, i) => `第${i + 1}轮:${n}次`).join('，');
    interruptText = `共${totalInterrupts}次（${details}）`;
  }
  $('cardInterrupt').textContent = interruptText;

  $('cardModal').classList.add('show');
}

// 保存签名卡为图片
function saveCard() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const w = 600;
  const h = 480;
  canvas.width = w;
  canvas.height = h;

  /** 绘制主体内容（头像可选传入） */
  function drawCard(avatarImg) {
    // 背景
    ctx.fillStyle = '#FFFFFF';
    roundRect(ctx, 0, 0, w, h, 20, true);

    // 头部渐变
    const headerGrad = ctx.createLinearGradient(0, 0, w, 140);
    headerGrad.addColorStop(0, '#FF6B6B');
    headerGrad.addColorStop(0.5, '#FF8A65');
    headerGrad.addColorStop(1, '#FFE66D');
    ctx.fillStyle = headerGrad;
    roundRectTop(ctx, 0, 0, w, 140, 20);
    ctx.fill();

    // 头部文字
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '36px "Baloo 2", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🏆', w / 2, 55);
    ctx.font = 'bold 26px "Baloo 2", sans-serif';
    ctx.fillText('跳绳达人签名卡', w / 2, 100);

    // 信息区域
    const rows = [
      { icon: '👦', label: '小达人', value: state.childName, isAvatar: true },
      { icon: '📅', label: '完成时间', value: $('cardTime').textContent },
      { icon: '⏱️', label: '跳绳时长', value: `${state.accTotalRounds * state.selectedMinutes} 分钟（${state.accTotalRounds}轮）` },
      { icon: '🔔', label: '中断次数', value: $('cardInterrupt').textContent },
    ];

    let y = 180;
    rows.forEach(row => {
      // 绘制图标区域
      if (row.isAvatar && avatarImg) {
        // 绘制圆角头像
        ctx.save();
        const iconX = 34;
        const iconY = y - 20;
        const iconSize = 32;
        const iconR = 8;
        ctx.beginPath();
        ctx.moveTo(iconX + iconR, iconY);
        ctx.lineTo(iconX + iconSize - iconR, iconY);
        ctx.quadraticCurveTo(iconX + iconSize, iconY, iconX + iconSize, iconY + iconR);
        ctx.lineTo(iconX + iconSize, iconY + iconSize - iconR);
        ctx.quadraticCurveTo(iconX + iconSize, iconY + iconSize, iconX + iconSize - iconR, iconY + iconSize);
        ctx.lineTo(iconX + iconR, iconY + iconSize);
        ctx.quadraticCurveTo(iconX, iconY + iconSize, iconX, iconY + iconSize - iconR);
        ctx.lineTo(iconX, iconY + iconR);
        ctx.quadraticCurveTo(iconX, iconY, iconX + iconR, iconY);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(avatarImg, iconX, iconY, iconSize, iconSize);
        ctx.restore();
      } else {
        ctx.textAlign = 'left';
        ctx.font = '22px sans-serif';
        ctx.fillStyle = '#2D3436';
        ctx.fillText(row.icon, 40, y);
      }

      ctx.textAlign = 'left';
      ctx.font = '13px sans-serif';
      ctx.fillStyle = '#636E72';
      ctx.fillText(row.label, 80, y - 8);
      ctx.font = 'bold 17px sans-serif';
      ctx.fillStyle = '#2D3436';
      ctx.fillText(row.value, 80, y + 14);
      // 分隔线
      ctx.strokeStyle = '#F0F0F0';
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(40, y + 30);
      ctx.lineTo(w - 40, y + 30);
      ctx.stroke();
      ctx.setLineDash([]);
      y += 65;
    });

    // 认证印章 - 右侧垂直居中
    const contentTop = 140;
    const contentBottom = y;
    const centerY = (contentTop + contentBottom) / 2;
    ctx.save();
    ctx.translate(w - 110, centerY);
    ctx.rotate(0.2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    roundRectCenter(ctx, 0, 0, 150, 36, 10);
    ctx.fill();
    ctx.strokeStyle = '#4ECDC4';
    ctx.lineWidth = 3;
    roundRectCenter(ctx, 0, 0, 150, 36, 10);
    ctx.stroke();
    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = '#3AB5AD';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✓ 完成认证', 0, 0);
    ctx.restore();

    // 下载
    const link = document.createElement('a');
    link.download = `跳绳签名卡_${state.childName}_${formatDate(new Date())}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // 如果有用户头像，先加载图片再绘制
  if (state.avatarSrc) {
    const img = new Image();
    img.onload = function() { drawCard(img); };
    img.onerror = function() { drawCard(null); };
    img.src = state.avatarSrc;
  } else {
    drawCard(null);
  }
}

// Canvas 辅助函数
function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
}

function roundRectTop(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function roundRectCenter(ctx, cx, cy, w, h, r) {
  const x = cx - w / 2;
  const y = cy - h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ========== 撒花动画 ==========
function launchConfetti() {
  const container = $('confettiContainer');
  const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#A78BFA', '#FF8A65', '#87CEEB'];
  for (let i = 0; i < 60; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.top = '-10px';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.width = (Math.random() * 8 + 6) + 'px';
    confetti.style.height = (Math.random() * 8 + 6) + 'px';
    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
    confetti.style.animationDelay = (Math.random() * 1) + 's';
    if (Math.random() > 0.5) confetti.style.borderRadius = '50%';
    container.appendChild(confetti);
  }
  // 清理
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// ========== 累计倒计时轮数控制 ==========
function changeAccRounds(delta) {
  if (state.isRunning) return; // 运行中不允许修改
  state.accTotalRounds = Math.max(1, state.accTotalRounds + delta);
  state.accCurrentRound = 1;
  updateAccDisplay();
}

function updateAccDisplay() {
  $('accCurrent').textContent = state.accCurrentRound;
  $('accTotal').textContent = state.accTotalRounds;
  $('accTotalMinutes').textContent = state.accTotalRounds * state.selectedMinutes;
}

function resetAccRounds() {
  if (state.isRunning || state.isResting) return; // 运行中或休息中不允许重置
  state.accCurrentRound = 1;
  state.accTotalRounds = 1;
  state.waitingNextRound = false;
  state.interrupts = 0;
  state.interruptsPerRound = [];
  interruptCountEl.textContent = '0';
  updateAccDisplay();
  // 同步重置计时器显示（回到第1轮初始状态）
  state.remainingSeconds = state.totalSeconds;
  state.isFinished = false;
  updateTimerDisplay();
  updateRing();
  timeLabel.textContent = '准备开始';
  btnStart.innerHTML = '▶ 开始';
  btnStart.className = 'btn btn-start';
  btnStart.disabled = false;
}

// ========== 工具函数 ==========
function formatDateTime(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const hh = String(date.getHours()).padStart(2, '0');
  const mm = String(date.getMinutes()).padStart(2, '0');
  const ss = String(date.getSeconds()).padStart(2, '0');
  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}

function formatDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}${m}${d}`;
}

function shakeElement(el) {
  el.style.animation = 'none';
  el.offsetHeight; // 触发重排
  el.style.animation = 'shake 0.4s ease';
}

// 添加 shake 动画
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
`;
document.head.appendChild(shakeStyle);

// 点击弹窗外部关闭
$('cardModal').addEventListener('click', function(e) {
  if (e.target === this) closeCardModal();
});
$('nameModal').addEventListener('click', function(e) {
  if (e.target === this) closeNameModal();
});

// 初始化显示
updateTimerDisplay();
updateAccDisplay();

// 从缓存恢复姓名和头像
$('childName').textContent = state.childName;
if (state.avatarSrc) {
  $('avatarDisplay').innerHTML = `<img src="${state.avatarSrc}" alt="头像">`;
}
</script>
